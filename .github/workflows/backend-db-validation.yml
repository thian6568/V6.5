name: backend-db-validation

on:
  workflow_dispatch:
  push:
    paths:
      - "backend/supabase/migrations/**"
      - "backend/supabase/tests/**"
      - "scripts/db_validate_migrations.sh"
      - ".github/workflows/backend-db-validation.yml"
  pull_request:
    paths:
      - "backend/supabase/migrations/**"
      - "backend/supabase/tests/**"
      - "scripts/db_validate_migrations.sh"
      - ".github/workflows/backend-db-validation.yml"

jobs:
  postgres-validate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGPASSWORD: postgres
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: postgres
      DB_NAME: artist_in_art_migration_validation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

  - name: Validate migrations 0001-0018
  run: bash scripts/db_validate_migrations.sh
